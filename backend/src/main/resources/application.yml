spring:
  application:
    name: gestion-usuarios-roles
  datasource:
    url: jdbc:postgresql://localhost:5432/usuarios_db
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true

server:
  port: 8080
  servlet:
    context-path: /api

app:
  jwt:
    secret: ${JWT_SECRET:cambiar-en-produccion-minimo-32-caracteres}
    expiration: 900000
    refresh-expiration: 604800000