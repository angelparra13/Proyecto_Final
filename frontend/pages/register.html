<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro</title>
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/auth.css">
</head>
<body>
    <div class="auth-wrapper">
        <div class="auth-card">
            <h1 class="auth-title">Crear cuenta</h1>
            <p class="auth-subtitle">Completa el formulario para registrarte</p>

            <div id="error-msg" class="alert alert-error" style="display:none;"></div>
            <div id="success-msg" class="alert alert-success" style="display:none;"></div>

            <form id="register-form" novalidate>
                <div class="form-group">
                    <label class="form-label" for="name">Nombre completo</label>
                    <input
                        class="form-control"
                        type="text"
                        id="name"
                        name="name"
                        placeholder="Juan Pérez"
                        required
                        autocomplete="name"
                    >
                </div>

                <div class="form-group">
                    <label class="form-label" for="email">Correo electrónico</label>
                    <input
                        class="form-control"
                        type="email"
                        id="email"
                        name="email"
                        placeholder="usuario@ejemplo.com"
                        required
                        autocomplete="email"
                    >
                </div>

                <div class="form-group">
                    <label class="form-label" for="password">Contraseña</label>
                    <input
                        class="form-control"
                        type="password"
                        id="password"
                        name="password"
                        placeholder="Mínimo 6 caracteres"
                        required
                        minlength="6"
                        autocomplete="new-password"
                    >
                </div>

                <button type="submit" class="btn btn-primary btn-lg" id="btn-submit">
                    Crear cuenta
                </button>
            </form>

            <p class="auth-footer">
                ¿Ya tienes cuenta?
                <a href="./login.html">Inicia sesión</a>
            </p>
        </div>
    </div>

    <script type="module">
        import { register } from '../js/auth.js';

        const form      = document.getElementById('register-form');
        const errorEl   = document.getElementById('error-msg');
        const successEl = document.getElementById('success-msg');
        const btnEl     = document.getElementById('btn-submit');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            errorEl.style.display   = 'none';
            successEl.style.display = 'none';
            btnEl.disabled = true;
            btnEl.textContent = 'Registrando...';

            try {
                await register(
                    document.getElementById('name').value.trim(),
                    document.getElementById('email').value.trim(),
                    document.getElementById('password').value
                );
                successEl.textContent = 'Cuenta creada. Redirigiendo...';
                successEl.style.display = 'block';
                setTimeout(() => window.location.href = './login.html', 1500);
            } catch (err) {
                errorEl.textContent = err.message;
                errorEl.style.display = 'block';
                btnEl.disabled = false;
                btnEl.textContent = 'Crear cuenta';
            }
        });
    </script>
</body>
</html>
