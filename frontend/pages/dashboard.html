<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/dashboard.css">
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar">
        <a class="navbar-brand" href="#">GestionApp</a>
        <div class="navbar-right">
            <span class="navbar-user">Hola, <strong id="user-name">...</strong></span>
            <button class="btn btn-outline" id="btn-profile">Mi perfil</button>
            <button class="btn btn-danger"  id="btn-logout">Salir</button>
        </div>
    </nav>

    <!-- Contenido principal -->
    <main class="main-content">
        <h1 class="page-title">Mi Dashboard</h1>

        <div id="error-message" class="alert alert-error" style="display:none;"></div>
        <div id="success-message" class="alert alert-success" style="display:none;"></div>

        <!-- Tarjetas de resumen -->
        <div class="cards-grid">
            <div class="card">
                <div class="card-header">
                    <div class="card-icon card-icon-blue">📅</div>
                    <span class="card-label">Fecha de registro</span>
                </div>
                <div class="card-value" id="user-created">—</div>
            </div>

            <div class="card">
                <div class="card-header">
                    <div class="card-icon card-icon-green">🔑</div>
                    <span class="card-label">Último acceso</span>
                </div>
                <div class="card-value" id="user-last-login">—</div>
            </div>

            <div class="card">
                <div class="card-header">
                    <div class="card-icon card-icon-purple">✅</div>
                    <span class="card-label">Estado de cuenta</span>
                </div>
                <div class="card-value" id="user-status-card">—</div>
            </div>
        </div>

        <!-- Información de la cuenta -->
        <div class="info-section">
            <h2>Información de cuenta</h2>
            <div class="info-row">
                <span class="info-key">Nombre</span>
                <span class="info-value" id="user-full-name">—</span>
            </div>
            <div class="info-row">
                <span class="info-key">Correo electrónico</span>
                <span class="info-value" id="user-email">—</span>
            </div>
            <div class="info-row">
                <span class="info-key">Rol</span>
                <span class="info-value" id="user-role">—</span>
            </div>
            <div class="info-row">
                <span class="info-key">Estado</span>
                <span class="info-value" id="user-status">—</span>
            </div>
        </div>
    </main>

    <!-- Modal de perfil -->
    <div class="modal-overlay" id="profile-modal">
        <div class="modal">
            <div class="modal-header">
                <h2 class="modal-title">Mi perfil</h2>
                <button class="modal-close" id="btn-close-modal">&times;</button>
            </div>

            <div id="profile-error" class="alert alert-error"   style="display:none;"></div>
            <div id="profile-success" class="alert alert-success" style="display:none;"></div>

            <!-- Formulario edición de datos -->
            <form id="profile-form">
                <h3 style="margin-bottom:1rem; font-size:0.9rem; color:var(--text-secondary);">DATOS PERSONALES</h3>
                <div class="form-group">
                    <label class="form-label" for="profile-name">Nombre</label>
                    <input class="form-control" type="text" id="profile-name" required>
                </div>
                <div class="form-group">
                    <label class="form-label" for="profile-email">Email</label>
                    <input class="form-control" type="email" id="profile-email" required>
                </div>
                <button type="submit" class="btn btn-primary" style="width:100%;">Guardar cambios</button>
            </form>

            <hr style="margin:1.5rem 0; border-color:var(--border);">

            <!-- Formulario cambio de contraseña -->
            <form id="password-form">
                <h3 style="margin-bottom:1rem; font-size:0.9rem; color:var(--text-secondary);">CAMBIAR CONTRASEÑA</h3>
                <div class="form-group">
                    <label class="form-label" for="current-password">Contraseña actual</label>
                    <input class="form-control" type="password" id="current-password" required>
                </div>
                <div class="form-group">
                    <label class="form-label" for="new-password">Nueva contraseña</label>
                    <input class="form-control" type="password" id="new-password" required minlength="6">
                </div>
                <button type="submit" class="btn btn-secondary" style="width:100%;">Cambiar contraseña</button>
            </form>

            <hr style="margin:1.5rem 0; border-color:var(--border);">

            <button class="btn btn-danger" style="width:100%;" id="btn-delete-account">
                Eliminar mi cuenta
            </button>
        </div>
    </div>

    <script type="module" src="../js/dashboard.js"></script>
    <script type="module" src="../js/profile.js"></script>
</body>
</html>
