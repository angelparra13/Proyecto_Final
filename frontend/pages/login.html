<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar sesión</title>
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/auth.css">
</head>
<body>
    <div class="auth-wrapper">
        <div class="auth-card">
            <h1 class="auth-title">Bienvenido</h1>
            <p class="auth-subtitle">Ingresa tus credenciales para continuar</p>

            <div id="error-msg" class="alert alert-error" style="display:none;"></div>

            <form id="login-form" novalidate>
                <div class="form-group">
                    <label class="form-label" for="email">Correo electrónico</label>
                    <input
                        class="form-control"
                        type="email"
                        id="email"
                        name="email"
                        placeholder="usuario@ejemplo.com"
                        required
                        autocomplete="email"
                    >
                </div>

                <div class="form-group">
                    <label class="form-label" for="password">Contraseña</label>
                    <input
                        class="form-control"
                        type="password"
                        id="password"
                        name="password"
                        placeholder="••••••••"
                        required
                        autocomplete="current-password"
                    >
                </div>

                <button type="submit" class="btn btn-primary btn-lg" id="btn-submit">
                    Iniciar sesión
                </button>
            </form>

            <p class="auth-footer">
                ¿No tienes cuenta?
                <a href="./register.html">Regístrate aquí</a>
            </p>
        </div>
    </div>

    <script type="module">
        import { login } from '../js/auth.js';

        const form    = document.getElementById('login-form');
        const errorEl = document.getElementById('error-msg');
        const btnEl   = document.getElementById('btn-submit');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            errorEl.style.display = 'none';
            btnEl.disabled = true;
            btnEl.textContent = 'Entrando...';

            try {
                await login(
                    document.getElementById('email').value.trim(),
                    document.getElementById('password').value
                );
            } catch (err) {
                errorEl.textContent = err.message;
                errorEl.style.display = 'block';
                btnEl.disabled = false;
                btnEl.textContent = 'Iniciar sesión';
            }
        });
    </script>
</body>
</html>
